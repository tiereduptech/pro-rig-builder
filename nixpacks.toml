# Force Railway/Nixpacks to treat this as a Node.js project.
# The repo contains a .NET WPF scanner project (pchw-scanner/) which was
# confusing auto-detection into running `dotnet restore` at the root.

providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

# Custom Express server (server.cjs). Required because `serve -s dist` rewrites
# every unknown path to root index.html, which means our 16 pre-rendered route
# files (dist/search/index.html, dist/builder/index.html, etc.) are unreachable.
# server.cjs serves directory-index files first, then falls back to SPA shell.
[start]
cmd = "node server.cjs"

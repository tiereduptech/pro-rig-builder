# Force Railway/Nixpacks to treat this as a Node.js project.
# The repo contains a .NET WPF scanner project (pchw-scanner/) which was
# confusing auto-detection into running `dotnet restore` at the root.

providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npx serve -s dist -l $PORT"

# Force Railway/Nixpacks to treat this as a Node.js project.
# The repo contains a .NET WPF scanner project (pchw-scanner/) which was
# confusing auto-detection into running `dotnet restore` at the root.

providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci --omit=dev"]

# IMPORTANT: build is skipped on Railway. We commit dist/ to git because:
#   1) Pre-rendering needs Puppeteer + headless Chrome, which fails on Railway's
#      container without extensive nixpkgs deps for libnss/libgbm/etc.
#   2) Vite uses content-hashed filenames, so unchanged code yields unchanged
#      output — diffs stay small even with dist/ committed.
#   3) Railway deploys are faster (no rebuild step).
# Local workflow: `npm run build` (vite + prerender) → git add dist → push.
[phases.build]
cmds = ["echo 'Skipping build on Railway — using committed dist/ artifacts'"]

[start]
cmd = "node server.cjs"
